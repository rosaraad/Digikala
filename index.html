<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex;

            .left {
                width: 50vw;
                height: calc(100vh - 40px);
                background-color: #e0afb6;
                display: flex;
                align-items: center;

                .left-box {
                    width: 100%;
                    height: 60px;
                    background-color: #ef4056;
                    display: flex;
                    justify-content: center;
                    transition: 800ms;

                    a {
                        text-decoration: none;
                        color: whitesmoke;
                        line-height: 60px;
                        font-size: 15px;
                    }
                }
            }

            .right {
                width: 50vw;
                height: calc(100vh - 40px);
                background-color: #97deb8;
                display: flex;
                align-items: center;

                .right-box {
                    width: 100%;
                    height: 60px;
                    background-color: #009a49;
                    display: flex;
                    justify-content: center;
                    transition: 800ms;

                    a {
                        text-decoration: none;
                        color: whitesmoke;
                        line-height: 60px;
                        font-size: 15px;
                    }
                }
            }
        }

        .footer {
            background-color: black;
            color: whitesmoke;
            font-size: 14px;
            height: 40px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            left: 0;
            bottom: 0;
        }

        .left-box:hover,
        .right-box:hover {
            border-radius: 30px;
            transform: scaleX(90%);
            transition: 800ms;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <div class="left-box">
                <a href="./Home Page/index.html" class="left-box-link">Home Page</a>
            </div>
        </div>
        <div class="right">
            <div class="right-box">
                <a href="./Supermarket/index.html" class="right-box-link">Supermarket</a>
            </div>
        </div>
    </div>
    <div class="footer">@made by rosaraad</div>

</body>

</html>
